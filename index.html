<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DungeonmAIstro — your AI-powered D&D 5e Dungeon Master" />
    <title>DungeonmAIstro</title>

    <!--
      CSP — dev-friendly policy.
      In production, tighten script-src by replacing 'unsafe-inline'
      with a per-request nonce injected by your server/CDN.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com;
        font-src    'self' https://api.fontshare.com https://cdn.fontshare.com https://fonts.gstatic.com;
        img-src     'self' data: blob:;
        connect-src 'self'
          https://api.openai.com
          https://api.anthropic.com
          https://generativelanguage.googleapis.com
          https://cdnjs.cloudflare.com;
        worker-src  blob:;
        object-src  'none';
        base-uri    'self';
        form-action 'self';
        frame-ancestors 'none';
      "
    />

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cinzel@400,700&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
